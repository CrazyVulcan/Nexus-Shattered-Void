<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSD Builder — NEXUS: Shattered Void</title>
  <meta name="description" content="Build, edit, and print Ship System Displays (SSD) for Nexus: Shattered Void.">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    /* ── Builder layout ───────────────────────────────── */
    .builder-page {
      padding-top: var(--nav-height);
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }
    .builder-toolbar {
      background: var(--color-bg-2);
      border-bottom: 1px solid var(--color-border);
      padding: var(--sp-3) var(--sp-5);
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      flex-wrap: wrap;
      position: sticky;
      top: var(--nav-height);
      z-index: 50;
    }
    .builder-toolbar .toolbar-title {
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-dim);
      margin-right: var(--sp-2);
      flex-shrink: 0;
    }
    .toolbar-actions { display: flex; gap: var(--sp-2); flex-wrap: wrap; margin-left: auto; }

    /* ── Two-panel layout ─────────────────────────────── */
    .builder-body {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      overflow: hidden;
    }

    /* ── Editor panel (left) ──────────────────────────── */
    .editor-panel {
      background: var(--color-bg-2);
      border-right: 1px solid var(--color-border);
      overflow-y: auto;
      padding: var(--sp-5);
      display: flex;
      flex-direction: column;
      gap: var(--sp-5);
    }
    .editor-section {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .editor-section-header {
      background: var(--color-bg-card);
      padding: var(--sp-3) var(--sp-4);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-dim);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .editor-section-body {
      padding: var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--sp-3); }
    .form-group { display: flex; flex-direction: column; gap: var(--sp-1); }
    .form-group.full { grid-column: 1 / -1; }
    label.form-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--color-text-dim);
      font-weight: 600;
    }
    .form-input, .form-select, .form-textarea {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      color: var(--color-text-bright);
      padding: var(--sp-2) var(--sp-3);
      font-size: 0.875rem;
      transition: border-color var(--transition);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--color-cyan);
    }
    .form-textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
    input[type=number].form-input { width: 100%; }

    /* Track editor */
    .track-editor {
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--sp-3);
      background: rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }
    .track-editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-2);
    }
    .track-editor-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-text-bright);
      flex: 1;
    }
    .track-editor-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-3);
    }
    .hit-numbers-hint {
      font-size: 0.67rem;
      color: var(--color-text-muted);
      margin-top: var(--sp-1);
    }

    /* Secondary/generic weapon list items */
    .list-track-item {
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .list-track-item-header {
      background: var(--color-bg-card);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-2) var(--sp-3);
      border-bottom: 1px solid var(--color-border);
    }
    .list-track-item-title {
      flex: 1;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--color-text-bright);
    }
    .list-track-item-body {
      padding: var(--sp-3);
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }
    .btn-icon {
      background: none;
      border: 1px solid var(--color-border);
      color: var(--color-text-dim);
      width: 24px;
      height: 24px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .btn-icon:hover { border-color: var(--color-cyan); color: var(--color-cyan); }
    .btn-icon.danger:hover { border-color: var(--color-red); color: var(--color-red); }
    .btn-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      width: 100%;
      padding: var(--sp-2) var(--sp-3);
      background: rgba(0,212,255,0.05);
      border: 1px dashed var(--color-cyan-dim);
      border-radius: var(--radius);
      color: var(--color-cyan);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-add:hover {
      background: rgba(0,212,255,0.1);
      border-color: var(--color-cyan);
    }
    .load-ship-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--sp-2);
      align-items: end;
    }

    /* ── Preview panel (right) ────────────────────────── */
    .preview-panel {
      background: #e8e8e8;
      overflow-y: auto;
      padding: var(--sp-6);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── SSD Sheet styles ─────────────────────────────── */
    :root {
      --sl: #1a1a1a;
      --sl-dim: #555;
      --sbg: #f8f8f8;
      --box: 18px;
    }
    .ssd-sheet {
      background: var(--sbg);
      border: 2px solid var(--sl);
      color: var(--sl);
      width: 100%;
      max-width: 960px;
      padding: 6mm;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }
    /* Sheet Header */
    .sheet-header {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      align-items: start;
      border-bottom: 2px solid var(--sl);
      padding-bottom: 6px;
      margin-bottom: 8px;
    }
    .sheet-main-title {
      font-size: 1.3rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1.1;
    }
    .sheet-class {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--sl-dim);
      margin-top: 2px;
    }
    .sheet-faction-role {
      font-size: 0.68rem;
      color: var(--sl-dim);
      margin-top: 1px;
    }
    .sheet-stat-box {
      border: 1.5px solid var(--sl);
      padding: 3px 8px;
      text-align: center;
      min-width: 48px;
    }
    .sheet-stat-label {
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--sl-dim);
    }
    .sheet-stat-value {
      font-size: 1.3rem;
      font-weight: 900;
      line-height: 1.1;
    }
    /* Sheet Body */
    .sheet-body {
      display: grid;
      grid-template-columns: 200px 1fr 200px;
      gap: 8px;
    }
    /* ── Track sections ───────────────────────────────── */
    .ssd-track-section {
      border: 1.5px solid var(--sl);
      background: rgba(255,255,255,0.7);
      padding: 4px 6px;
      margin-bottom: 5px;
    }
    .ssd-track-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 3px;
    }
    .ssd-track-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .ssd-track-hit {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--sl-dim);
      background: rgba(0,0,0,0.08);
      padding: 0 4px;
      border: 1px solid rgba(0,0,0,0.15);
    }
    .ssd-track-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
    }
    .ssd-box {
      width: var(--box);
      height: var(--box);
      border: 1.5px solid var(--sl);
      background: #fff;
      cursor: pointer;
      appearance: none;
      display: block;
      flex-shrink: 0;
    }
    .ssd-box:checked { background: var(--sl); }
    /* Threshold / cross-hatch marker */
    .ssd-threshold {
      width: var(--box);
      height: var(--box);
      border: 1.5px solid var(--sl);
      flex-shrink: 0;
      background:
        linear-gradient(to top right,
          transparent calc(50% - 0.8px), var(--sl) calc(50% - 0.8px),
          var(--sl) calc(50% + 0.8px), transparent calc(50% + 0.8px)),
        linear-gradient(to top left,
          transparent calc(50% - 0.8px), var(--sl) calc(50% - 0.8px),
          var(--sl) calc(50% + 0.8px), transparent calc(50% + 0.8px)),
        white;
    }
    /* Power level sidebar */
    .ssd-engineering-row {
      display: flex;
      gap: 5px;
      align-items: flex-start;
    }
    .ssd-power-levels {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .ssd-power-badge {
      border: 1px solid var(--sl);
      background: #fff;
      font-size: 0.6rem;
      font-weight: 800;
      padding: 1px 4px;
      text-align: center;
      white-space: nowrap;
    }
    /* ── Center column ────────────────────────────────── */
    .ssd-center {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    /* Hit allocation table */
    .ssd-hit-table {
      border: 1.5px solid var(--sl);
      background: rgba(255,255,255,0.7);
    }
    .ssd-hit-table-title {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 2px 5px;
      border-bottom: 1px solid var(--sl);
      background: rgba(0,0,0,0.05);
    }
    .ssd-hit-row {
      display: flex;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .ssd-hit-row:last-child { border-bottom: none; }
    .ssd-hit-die {
      width: 22px;
      font-size: 0.68rem;
      font-weight: 800;
      text-align: center;
      padding: 2px 0;
      border-right: 1px solid var(--sl);
      background: rgba(0,0,0,0.05);
      flex-shrink: 0;
    }
    .ssd-hit-target {
      font-size: 0.65rem;
      padding: 2px 5px;
      flex: 1;
    }
    /* Stats */
    .ssd-stats-row {
      border: 1.5px solid var(--sl);
      background: rgba(255,255,255,0.7);
      padding: 4px 6px;
    }
    .ssd-stats-grid {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .ssd-stat-chip {
      border: 1px solid var(--sl);
      background: #fff;
      padding: 2px 8px;
      font-weight: 800;
      font-size: 0.72rem;
      text-align: center;
      min-width: 44px;
    }
    .ssd-stat-chip-label {
      font-size: 0.52rem;
      color: var(--sl-dim);
      font-weight: 700;
      text-transform: uppercase;
      display: block;
    }
    /* Generic tracks in center */
    .ssd-generic-tracks { display: flex; flex-direction: column; gap: 4px; }
    /* Notes */
    .ssd-notes {
      border: 1.5px solid var(--sl);
      background: rgba(255,255,255,0.7);
      padding: 4px 6px;
      font-size: 0.67rem;
      line-height: 1.5;
      color: var(--sl-dim);
    }
    .ssd-notes-label {
      font-size: 0.62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--sl);
      margin-bottom: 2px;
    }
    /* ── Right column: weapons ────────────────────────── */
    .ssd-weapons-col {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .ssd-weapon-section {
      border: 1.5px solid var(--sl);
      background: rgba(255,255,255,0.7);
    }
    .ssd-weapon-header {
      border-bottom: 1px solid var(--sl);
      padding: 3px 6px;
      background: rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .ssd-weapon-name {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .ssd-weapon-hit {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--sl-dim);
    }
    .ssd-weapon-body { padding: 4px 6px; }
    .ssd-weapon-stats {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
      margin-bottom: 3px;
    }
    .ssd-weapon-stat-tag {
      border: 1px solid var(--sl);
      padding: 1px 4px;
      background: #fff;
      font-size: 0.63rem;
      font-weight: 700;
    }
    .ssd-weapon-traits {
      font-size: 0.6rem;
      color: var(--sl-dim);
      font-style: italic;
    }
    /* Sheet footer */
    .ssd-footer {
      margin-top: 6px;
      border-top: 1px solid var(--sl);
      padding-top: 4px;
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--sl-dim);
    }

    /* ── Toast ────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: var(--sp-6);
      right: var(--sp-6);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      pointer-events: none;
    }
    .toast {
      background: var(--color-bg-card-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--sp-3) var(--sp-5);
      font-size: 0.85rem;
      color: var(--color-text-bright);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      animation: toastIn 0.2s ease;
    }
    .toast.success { border-color: var(--color-teal); }
    .toast.error   { border-color: var(--color-red); }
    .toast.warning { border-color: var(--color-orange); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 1000px) {
      .builder-body { grid-template-columns: 1fr; }
      .preview-panel { display: none; }
    }

    /* ── Print ────────────────────────────────────────── */
    @page { size: A4 landscape; margin: 8mm; }
    @media print {
      body, .builder-page { background: #fff !important; }
      .main-nav, .builder-toolbar, .editor-panel { display: none !important; }
      .preview-panel {
        background: #fff !important;
        padding: 0 !important;
        overflow: visible !important;
      }
      .builder-body { grid-template-columns: 1fr; }
      .ssd-sheet { box-shadow: none; max-width: none; width: 100%; }
    }
  </style>
</head>
<body class="builder-page">
  <!-- Nav injected by JS -->
  <div class="page-content" style="display:contents">

    <!-- ── Toolbar ──────────────────────────────────────── -->
    <div class="builder-toolbar" id="builder-toolbar">
      <span class="toolbar-title">⚙ SSD Builder</span>
      <div class="form-group" style="flex-direction:row;align-items:center;gap:var(--sp-2)">
        <label class="form-label" for="load-ship-select" style="white-space:nowrap">Load Template:</label>
        <select id="load-ship-select" class="form-select" style="max-width:220px"></select>
        <button id="load-ship-btn" class="btn btn-ghost btn-sm">Load →</button>
      </div>
      <div class="toolbar-actions">
        <button id="new-ship-btn"   class="btn btn-ghost btn-sm">+ New Ship</button>
        <button id="save-btn"       class="btn btn-secondary btn-sm">💾 Save</button>
        <button id="load-local-btn" class="btn btn-ghost btn-sm">📂 Load Saved</button>
        <button id="export-btn"     class="btn btn-ghost btn-sm">⬇ Export JSON</button>
        <button id="print-btn"      class="btn btn-primary btn-sm">🖨 Print</button>
      </div>
    </div>

    <!-- ── Main body ───────────────────────────────────── -->
    <div class="builder-body">

      <!-- ── LEFT: Editor Panel ──────────────────────── -->
      <aside class="editor-panel" id="editor-panel">

        <!-- Ship Identity -->
        <div class="editor-section">
          <div class="editor-section-header">Ship Identity</div>
          <div class="editor-section-body">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="e-name">Ship Name</label>
                <input id="e-name" class="form-input" type="text" maxlength="40" placeholder="Resolve">
              </div>
              <div class="form-group">
                <label class="form-label" for="e-class">Class</label>
                <input id="e-class" class="form-input" type="text" maxlength="60" placeholder="Resolve-class Frigate">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="e-faction">Faction</label>
                <input id="e-faction" class="form-input" type="text" maxlength="60" placeholder="[Placeholder Faction]">
              </div>
              <div class="form-group">
                <label class="form-label" for="e-role">Role</label>
                <input id="e-role" class="form-input" type="text" maxlength="40" placeholder="Frigate">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="e-base-power">Base Power</label>
                <input id="e-base-power" class="form-input" type="number" min="1" max="12" value="3">
              </div>
              <div class="form-group">
                <label class="form-label" for="e-agility">Agility</label>
                <input id="e-agility" class="form-input" type="number" min="0" max="10" value="2">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="e-toughness">Toughness</label>
                <input id="e-toughness" class="form-input" type="number" min="0" max="10" value="3">
              </div>
            </div>
          </div>
        </div>

        <!-- Engineering Track -->
        <div class="editor-section">
          <div class="editor-section-header">Engineering Track</div>
          <div class="editor-section-body">
            <div class="track-editor" id="eng-track-editor">
              <div class="track-editor-controls">
                <div class="form-group">
                  <label class="form-label">Box Count</label>
                  <input id="eng-box-count" class="form-input" type="number" min="1" max="20" value="8">
                </div>
                <div class="form-group">
                  <label class="form-label">Hit d6 Nums</label>
                  <input id="eng-hit-nums" class="form-input" type="text" placeholder="1,2" value="1,2">
                  <span class="hit-numbers-hint">d6 values (1–6) that target this track</span>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Power Levels (comma-separated, high→low)</label>
                <input id="eng-power-levels" class="form-input" type="text" placeholder="3,2,1">
                <span class="hit-numbers-hint">Power available at each degradation step (e.g. 3,2,1)</span>
              </div>
              <div class="form-group">
                <label class="form-label">Threshold Positions</label>
                <input id="eng-thresholds" class="form-input" type="text" placeholder="3,5,7">
                <span class="hit-numbers-hint">Box indices (0-based) where cross-hatch markers appear</span>
              </div>
            </div>
          </div>
        </div>

        <!-- FTL Track -->
        <div class="editor-section">
          <div class="editor-section-header">FTL Track</div>
          <div class="editor-section-body">
            <div class="track-editor">
              <div class="track-editor-controls">
                <div class="form-group">
                  <label class="form-label">Box Count</label>
                  <input id="ftl-box-count" class="form-input" type="number" min="1" max="12" value="4">
                </div>
                <div class="form-group">
                  <label class="form-label">Hit d6 Nums</label>
                  <input id="ftl-hit-nums" class="form-input" type="text" placeholder="3" value="3">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Threshold Positions</label>
                <input id="ftl-thresholds" class="form-input" type="text" placeholder="2">
              </div>
            </div>
          </div>
        </div>

        <!-- Primary Weapon -->
        <div class="editor-section">
          <div class="editor-section-header">Primary Weapon</div>
          <div class="editor-section-body">
            <div class="track-editor">
              <div class="form-group">
                <label class="form-label">Weapon Name</label>
                <input id="pw-name" class="form-input" type="text" placeholder="Main Battery">
              </div>
              <div class="track-editor-controls">
                <div class="form-group">
                  <label class="form-label">Box Count</label>
                  <input id="pw-box-count" class="form-input" type="number" min="1" max="16" value="6">
                </div>
                <div class="form-group">
                  <label class="form-label">Hit d6 Nums</label>
                  <input id="pw-hit-nums" class="form-input" type="text" placeholder="4,5">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Threshold Positions</label>
                <input id="pw-thresholds" class="form-input" type="text" placeholder="3">
              </div>
              <div class="track-editor-controls">
                <div class="form-group">
                  <label class="form-label">Range</label>
                  <input id="pw-range" class="form-input" type="text" placeholder='0–12"'>
                </div>
                <div class="form-group">
                  <label class="form-label">Dice</label>
                  <input id="pw-dice" class="form-input" type="number" min="1" max="8" value="2">
                </div>
              </div>
              <div class="track-editor-controls">
                <div class="form-group">
                  <label class="form-label">Power Cost</label>
                  <input id="pw-power-cost" class="form-input" type="number" min="0" max="6" value="1">
                </div>
                <div class="form-group">
                  <label class="form-label">Traits</label>
                  <input id="pw-traits" class="form-input" type="text" placeholder="repeatable">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Secondary Weapons -->
        <div class="editor-section">
          <div class="editor-section-header">
            <span>Secondary Weapons</span>
          </div>
          <div class="editor-section-body">
            <div id="secondary-weapons-list"></div>
            <button class="btn-add" id="add-secondary-btn">+ Add Secondary Weapon</button>
          </div>
        </div>

        <!-- Generic Tracks -->
        <div class="editor-section">
          <div class="editor-section-header">
            <span>Generic Subsystem Tracks</span>
          </div>
          <div class="editor-section-body">
            <div id="generic-tracks-list"></div>
            <button class="btn-add" id="add-generic-btn">+ Add Generic Track</button>
          </div>
        </div>

        <!-- Notes -->
        <div class="editor-section">
          <div class="editor-section-header">Notes / Special Traits</div>
          <div class="editor-section-body">
            <div class="form-group">
              <textarea id="e-notes" class="form-textarea" placeholder="Special rules, traits, or designer notes..."></textarea>
            </div>
          </div>
        </div>

      </aside><!-- /editor-panel -->

      <!-- ── RIGHT: SSD Preview Panel ─────────────────── -->
      <div class="preview-panel" id="preview-panel">
        <div class="ssd-sheet" id="ssd-sheet"><!-- rendered by JS --></div>
      </div>

    </div><!-- /builder-body -->
  </div><!-- /page-content -->

  <script type="module" src="../js/builder.js"></script>
</body>
</html>
