<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSD Builder — NEXUS: Shattered Void</title>
  <meta name="description" content="Build and print Star Ship Displays (SSD) for Nexus: Shattered Void.">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    :root { --sheet-line: #1f1f1f; --sheet-bg: #f4f4f4; }
    .ssd-page { padding: var(--sp-5); max-width: 1200px; margin: 0 auto; }
    .builder-toolbar {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: var(--sp-3);
      margin-bottom: var(--sp-4);
      align-items: end;
    }
    .toolbar-actions { display: flex; gap: var(--sp-2); flex-wrap: wrap; justify-content: flex-end; }

    .ssd-sheet {
      background: var(--sheet-bg);
      border: 2px solid var(--sheet-line);
      color: #111;
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 8mm;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      font-family: var(--font-mono);
    }
    .sheet-header {
      display: grid;
      grid-template-columns: 2fr auto 1fr;
      align-items: center;
      gap: var(--sp-3);
      border-bottom: 2px solid var(--sheet-line);
      padding-bottom: var(--sp-2);
      margin-bottom: var(--sp-3);
    }
    .sheet-title-input {
      width: 100%;
      border: 1px solid var(--sheet-line);
      background: white;
      color: #111;
      font-size: 1.25rem;
      font-weight: 700;
      padding: 0.35rem 0.5rem;
      text-transform: uppercase;
    }
    .sheet-subtitle { font-size: 0.9rem; font-weight: 700; margin-top: 2px; }
    .fp-display { font-size: 2rem; font-weight: 800; text-align: center; }
    .faction-display { text-align: right; font-size: 0.95rem; font-weight: 700; text-transform: uppercase; }

    .sheet-body { display: grid; grid-template-columns: 1.25fr 1fr; gap: var(--sp-3); }
    .left-grid { display: grid; gap: var(--sp-3); }
    .subsystem {
      border: 1px solid var(--sheet-line);
      padding: var(--sp-2);
      background: rgba(255,255,255,0.65);
    }
    .subsystem-header { display: flex; justify-content: space-between; margin-bottom: var(--sp-2); font-weight: 700; }
    .track-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
    .track-box {
      appearance: none;
      width: 100%;
      aspect-ratio: 1 / 1;
      margin: 0;
      border: 1px solid #1f1f1f;
      background: #fff;
      cursor: pointer;
    }
    .track-box:checked { background: #111; }

    .center-panel {
      border: 1px solid var(--sheet-line);
      background: rgba(255,255,255,0.65);
      padding: var(--sp-3);
    }
    .silhouette {
      border: 1px solid var(--sheet-line);
      height: 180px;
      display: grid;
      place-items: center;
      margin-bottom: var(--sp-3);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: repeating-linear-gradient(45deg, #f7f7f7, #f7f7f7 6px, #efefef 6px, #efefef 12px);
    }
    .stat-line { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-2); margin-bottom: var(--sp-3); }
    .stat-chip { border: 1px solid var(--sheet-line); padding: 0.4rem; text-align: center; font-weight: 700; background: #fff; }

    .weapon-list { display: grid; gap: var(--sp-3); }
    .weapon-slot {
      border: 1px solid var(--sheet-line);
      background: rgba(255,255,255,0.65);
      padding: var(--sp-2);
    }
    .weapon-slot-header { font-weight: 700; margin-bottom: var(--sp-2); }
    .weapon-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 6px; }
    .weapon-meta div { border: 1px solid var(--sheet-line); padding: 0.2rem 0.35rem; background: #fff; font-size: 0.8rem; }

    .feature-add { display: flex; gap: var(--sp-2); margin-top: var(--sp-2); }
    .feature-list { margin-top: var(--sp-2); display: grid; gap: 4px; }
    .feature-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--sheet-line);
      background: #fff;
      padding: 0.25rem 0.45rem;
      font-size: 0.8rem;
    }

    .sheet-footer {
      margin-top: var(--sp-3);
      border-top: 1px solid var(--sheet-line);
      padding-top: var(--sp-2);
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      text-transform: uppercase;
    }

    @media (max-width: 980px) {
      .builder-toolbar { grid-template-columns: 1fr 1fr; }
      .sheet-body { grid-template-columns: 1fr; }
    }

    @page { size: A4 portrait; margin: 8mm; }
    @media print {
      body, .page-wrapper, .page-content { background: #fff !important; }
      .ssd-page { padding: 0; max-width: none; }
      .builder-toolbar, .btn-remove-feature { display: none !important; }
      .ssd-sheet { box-shadow: none; max-width: none; width: 100%; padding: 6mm; }
    }
  </style>
</head>
<body class="page-wrapper">
  <div class="page-content">
    <main class="ssd-page">
      <section class="builder-toolbar">
        <div class="form-group">
          <label class="form-label" for="faction-select">Faction</label>
          <select id="faction-select" class="form-select"></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="ship-select">Hull</label>
          <select id="ship-select" class="form-select"></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="ship-name-input">SSD Name</label>
          <input id="ship-name-input" class="form-input" type="text" maxlength="40" placeholder="AKIRA CLASS">
        </div>
        <div class="form-group">
          <label class="form-label" for="ship-type-input">Class / Type</label>
          <input id="ship-type-input" class="form-input" type="text" maxlength="40" placeholder="Battle Cruiser">
        </div>
        <div class="toolbar-actions">
          <button id="save-sheet-btn" class="btn btn-secondary btn-sm">💾 Save</button>
          <button id="load-sheet-btn" class="btn btn-ghost btn-sm">📂 Load</button>
          <button id="print-sheet-btn" class="btn btn-primary btn-sm">🖨️ Print A4</button>
        </div>
      </section>

      <section class="ssd-sheet" id="ssd-sheet">
        <header class="sheet-header">
          <div>
            <input id="sheet-title" class="sheet-title-input" type="text" value="Unnamed Class">
            <div class="sheet-subtitle" id="sheet-subtitle">No Hull Selected</div>
          </div>
          <div class="fp-display"><span id="sheet-fp">0</span> FP</div>
          <div class="faction-display" id="sheet-faction">Unaligned</div>
        </header>

        <div class="sheet-body">
          <div class="left-grid">
            <article class="subsystem">
              <div class="subsystem-header"><span>1-3 Structure</span><span id="structure-total">0</span></div>
              <div id="track-structure" class="track-grid"></div>
            </article>
            <article class="subsystem">
              <div class="subsystem-header"><span>1-2 Engineering</span><span id="engineering-total">0</span></div>
              <div id="track-engineering" class="track-grid"></div>
            </article>
            <article class="subsystem">
              <div class="subsystem-header"><span>3-4 Weapons</span><span id="weapons-total">0</span></div>
              <div id="track-weapons" class="track-grid"></div>
            </article>
            <article class="subsystem">
              <div class="subsystem-header"><span>5-6 Systems</span><span id="systems-total">0</span></div>
              <div id="track-systems" class="track-grid"></div>
            </article>
          </div>

          <div class="right-grid">
            <article class="center-panel">
              <div class="silhouette">Ship Silhouette Area</div>
              <div class="stat-line">
                <div class="stat-chip">SPD <span id="stat-speed">0</span></div>
                <div class="stat-chip">AGI <span id="stat-agility">0</span></div>
                <div class="stat-chip">SNS <span id="stat-sensors">0</span></div>
              </div>
              <div class="stat-line">
                <div class="stat-chip">HULL <span id="stat-hull">0</span></div>
                <div class="stat-chip">SHD <span id="stat-shields">0</span></div>
                <div class="stat-chip">CREW <span id="stat-crew">0</span></div>
              </div>

              <div class="subsystem-header"><span>SSD Features</span><span id="feature-count">0</span></div>
              <div class="feature-add">
                <input id="feature-input" class="form-input" type="text" maxlength="80" placeholder="Add feature (ex: FTL Drive)">
                <button id="add-feature-btn" class="btn btn-secondary btn-sm">Add</button>
              </div>
              <div id="feature-list" class="feature-list"></div>
            </article>

            <article class="weapon-list" id="weapon-list"></article>
          </div>
        </div>

        <footer class="sheet-footer">
          <span>Nexus: Shattered Void — Starship Display Builder</span>
          <span id="print-date"></span>
        </footer>
      </section>
    </main>
  </div>

  <script type="module" src="../js/builder.js"></script>
</body>
</html>
